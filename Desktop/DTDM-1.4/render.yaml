services:
  # Load Balancer Service
  - type: web
    name: scalable-ai-api-load-balancer
    runtime: python
    plan: starter
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn scalable_ai_api.load_balancer.render_app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SERVER_A_URL
        value: https://scalable-ai-api-server-a.onrender.com
      - key: SERVER_B_URL
        value: https://scalable-ai-api-server-b.onrender.com
      - key: HEALTH_CHECK_INTERVAL
        value: 30
      - key: REQUEST_TIMEOUT
        value: 30
      - key: LOG_LEVEL
        value: INFO

  # Server A Service
  - type: web
    name: scalable-ai-api-server-a
    runtime: python
    plan: starter
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn scalable_ai_api.ai_server.render_app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SERVER_ID
        value: Server A
      - key: LOG_LEVEL
        value: INFO

  # Server B Service
  - type: web
    name: scalable-ai-api-server-b
    runtime: python
    plan: starter
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn scalable_ai_api.ai_server.render_app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SERVER_ID
        value: Server B
      - key: LOG_LEVEL
        value: INFO