version: '3.8'

services:
  # Server A
  server-a:
    build:
      context: .
      dockerfile: Dockerfile.aiserver
    ports:
      - "8080:8080"
    environment:
      - SERVER_ID=Server A
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-network

  # Server B
  server-b:
    build:
      context: .
      dockerfile: Dockerfile.aiserver
    ports:
      - "8081:8080"
    environment:
      - SERVER_ID=Server B
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-network

  # Load Balancer
  load-balancer:
    build:
      context: .
      dockerfile: Dockerfile.loadbalancer
    ports:
      - "8000:8000"
    environment:
      - SERVER_A_URL=http://server-a:8080
      - SERVER_B_URL=http://server-b:8080
      - HEALTH_CHECK_INTERVAL=30
      - REQUEST_TIMEOUT=30
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    depends_on:
      server-a:
        condition: service_healthy
      server-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge